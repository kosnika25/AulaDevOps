spring.application.name=demo

# configurações do banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/fatecads_db
spring.datasource.username=postgres
spring.datasource.password=123
#Atualização automática do esquema do banco de dados
spring.jpa.hibernate.ddl-auto=update
#Mostrar as consultas SQL no console
spring.jpa.show-sql=true
#não formatar as consultas SQL 
spring.jpa.properties.hibernate.format_sql=false
#configuração porta do servidor
server.port=8080